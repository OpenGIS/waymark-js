    <title>Waymark JS</title>

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .waymark-instance {
        height: 300px;
        margin: 10px;
        width: 300px;

        /*        height: 100%;
        width: 100%;*/
      }
    </style>
  </head>
  <body>
    <!-- Load Waymark JS -->
    <script type="module">
      import {
        createInstance,
        createLine,
        createMarker,
        createMap,
      } from "./library/entry.js";

      const doOne = false;
      const doTwo = false;
      const doThree = false;
      const doFour = true;
      const doFive = false;
      const doSix = false;

      // ==================== DOCS ====================

      const instance = createInstance({
        // Will console.log() all Waymark JS Events
        // debug: true,

        // Unique ID repesenting the DOM element to load the Instance into
        // Is added to the DOM if it doesn't exist
        id: "waymark-instance",

        // MapLibre GL JS Options
        // See [MapLibre Map Options](https://maplibre.org/maplibre-gl-js/docs/API/type-aliases/MapOptions/)
        mapOptions: {
          zoom: 12,
        },

        // Can pass GeoJSON here
        geoJSON: {
          type: "FeatureCollection",
          features: [
            {
              // Set an ID here so you can access the Overlay
              id: "pub-marker",
              type: "Feature",
              properties: {
                // Waymark Properties
                waymark: {
                  // The Title & Descrption will display when the Marker is clicked
                  title: "The Scarlet Ibis",
                  description:
                    "Great pub, great food! Especially after a Long Ride 🚴🍔🍟🍺🍺💤",

                  // MapLibre GL JS Layer Paint Properties
                  paint: {
                    "circle-radius": 20,
                    "circle-color": "white",
                    "circle-stroke-color": "brown",
                    "circle-stroke-width": 6,
                  },

                  // Marker Icons
                  icon: {
                    // <img /> and <i /> tags work well here
                    html: `<div style="font-size:32px">🍺</div>`,

                    // Inline SVG supported
                    // svg: `<svg />`

                    // Image URLs supported
                    // url: "https://...pint.png
                  },
                },
              },
              geometry: {
                type: "Point",
                coordinates: [-128.0094, 50.6539],
              },
            },
          ],
        },

        // This function is called when the Instance has finished loading
        // and is passed the Instance as an argument
        onLoad: (thisInstance) => {
          //Get the Waymark JS Overlay for the "pub-marker" Feature
          const pubMarker = thisInstance.geoJSONStore.getItem("pub-marker");
          // Get the MapLibre GL JS Map
          const map = thisInstance.mapLibreStore.mapLibreMap;
          // Set the map view to fit the Marker (instantly)
          map.setCenter(pubMarker.geometry.coordinates);
          map.setZoom(12);
        },
      });

      // ==================== ONE ====================

      if (doOne) {
        // Demo data
        const urls = [
          "./assets/data/waymark/shape.geojson",
          "./assets/data/waymark/line.geojson",
          "./assets/data/waymark/featureCollection.geojson",
        ];

        // Create Instance
        const instanceOne = createInstance({
          debug: false,
          id: "waymark-one",
          onLoad: (WaymarkInstance) => {
            // Each URL
            urls.forEach(async (url) => {
              fetch(url).then(async (res) => {
                const geoJSON = await res.json();
                WaymarkInstance.geoJSONStore.addItem(geoJSON);
              });
            });
          },
        });
      }

      // =================== TWO ===================

      if (doTwo) {
        // Create Instance
        createInstance({
          debug: false,
          id: "waymark-two",
          mapOptions: {
            attributionControl: true,
          },
          onLoad: (WaymarkInstance) => {
            const map = WaymarkInstance.getMapByID("example-geojson");
            map.overlays.forEach((overlay) => {
              setInterval(() => {
                overlay.toggleHighlight();
              }, 500);
            });
          },
          geoJSON: {
            id: "example-geojson",
            type: "FeatureCollection",
            features: [
              {
                type: "Feature",
                properties: {
                  name: "Point Example",
                },
                geometry: {
                  type: "Point",
                  coordinates: [-77.034084, 38.909671],
                },
              },
              {
                type: "Feature",
                properties: {
                  name: "LineString Example",
                },
                geometry: {
                  type: "LineString",
                  coordinates: [
                    [-77.044211, 38.852924],
                    [-77.045659, 38.860158],
                    [-77.044232, 38.862326],
                    [-77.040879, 38.865948],
                    [-77.039936, 38.867698],
                    [-77.032969, 38.870285],
                    [-77.029609, 38.871907],
                    [-77.020339, 38.874276],
                    [-77.018789, 38.875115],
                    [-77.016841, 38.876516],
                    [-77.009051, 38.878241],
                  ],
                },
              },
            ],
          },
        });
      }

      // =================== THREE ====================

      if (doThree) {
        // Check local storage for
        const localMaps =
          JSON.parse(localStorage.getItem("waymarkLocalMaps")) || [];

        const instanceThree = createInstance({
          id: "waymark-three",
          debug: false,
          onLoad: (WaymarkInstance) => {
            localMaps.forEach((geoJSON) => {
              WaymarkInstance.geoJSONStore.addItem(geoJSON);
            });
          },
        });

        // Create file upload button
        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = ".json,.geojson";
        fileInput.addEventListener("change", (event) => {
          const file = event.target.files[0];
          const reader = new FileReader();
          reader.onload = (e) => {
            const geoJSON = JSON.parse(e.target.result);

            instanceThree.geoJSONStore.addItem(geoJSON);

            // Add to local storage
            localMaps.push(geoJSON);
            localStorage.setItem("waymarkLocalMaps", JSON.stringify(localMaps));
          };
          reader.readAsText(file);
        });
        document.body.appendChild(fileInput);
      }

      // =================== FOUR ====================

      if (doFour) {
        // Create a Waymark Instance with this configuration
        const instanceFour = createInstance({
          debug: false,

          id: "waymark-instance-four",
          // Passed directly to MapLibre GL JS
          // See [MapLibre Map Options](https://maplibre.org/maplibre-gl-js/docs/API/type-aliases/MapOptions/)
          mapOptions: {
            zoom: 12,
          },

          // Can pass GeoJSON here
          // geoJSON: { type: "FeatureCollection", features: [] }

          // Callback function
          onLoad: (thisInstance) => {
            // Load this GeoJSON, which contains a single "pub" Marker
            const map = thisInstance.geoJSONStore.addItem({
              type: "FeatureCollection",
              features: [
                {
                  type: "Feature",
                  properties: {
                    waymark: {
                      title: "The Scarlet Ibis",
                      description:
                        "Great pub, great food! Especially after a Long Ride 🚴🍔🍟🍺🍺💤",
                      icon: {
                        html: `🚴🍔🍟🍺🍺💤`,

                        //                         svg: `<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
                        //  width="1610.000000pt" height="1609.000000pt" viewBox="0 0 1610.000000 1609.000000"
                        //  preserveAspectRatio="xMidYMid meet">
                        // <g transform="translate(0.000000,1609.000000) scale(0.100000,-0.100000)"
                        // fill="#000000" stroke="none">
                        // <path d="M7945 16040 c-231 -42 -436 -214 -510 -426 -36 -103 -45 -180 -45
                        // -380 l0 -181 -72 -7 c-360 -34 -850 -130 -1233 -241 -2591 -753 -4533 -2934
                        // -4980 -5593 -20 -118 -65 -454 -65 -483 0 -3 -96 -9 -213 -12 -241 -7 -287
                        // -16 -411 -80 -148 -76 -269 -220 -323 -380 -24 -72 -27 -98 -27 -207 0 -109 3
                        // -135 27 -207 54 -160 175 -304 323 -380 124 -64 171 -73 410 -80 l211 -6 18
                        // -151 c261 -2287 1644 -4310 3693 -5405 484 -258 1015 -463 1557 -601 332 -85
                        // 639 -140 1028 -185 l57 -6 0 -172 c0 -191 10 -269 45 -371 63 -182 228 -340
                        // 423 -404 66 -22 95 -25 202 -25 107 0 136 3 202 25 195 64 360 222 423 404 35
                        // 102 45 180 45 371 0 198 -12 177 110 188 128 12 418 57 590 91 1212 243 2326
                        // 794 3261 1612 1232 1077 2066 2588 2313 4192 20 133 55 403 56 431 0 3 100 9
                        // 223 12 252 6 296 15 421 80 148 76 269 220 323 380 24 72 27 98 27 207 0 109
                        // -3 135 -27 207 -54 160 -175 304 -323 380 -125 65 -170 74 -421 80 l-223 6 -4
                        // 31 c-3 17 -10 76 -16 131 -40 359 -132 803 -250 1194 -472 1566 -1487 2928
                        // -2858 3835 -949 627 -2008 1009 -3144 1131 l-58 6 0 182 c0 201 -9 278 -45
                        // 381 -63 182 -231 342 -422 403 -87 27 -235 38 -318 23z m427 -2940 c1335 -90
                        // 2544 -675 3444 -1668 665 -734 1108 -1678 1248 -2662 40 -280 50 -426 50 -730
                        // 0 -304 -10 -451 -50 -729 -232 -1633 -1270 -3067 -2754 -3805 -572 -285 -1152
                        // -450 -1800 -512 -357 -35 -852 -20 -1225 37 -1614 244 -3019 1263 -3760 2724
                        // -565 1114 -695 2410 -365 3625 381 1402 1371 2592 2685 3226 782 377 1671 551
                        // 2527 494z"/>
                        // <path d="M7895 11761 c-174 -50 -265 -138 -372 -361 -78 -164 -2288 -5080
                        // -2331 -5185 -112 -278 -116 -394 -21 -586 119 -237 398 -380 634 -325 116 27
                        // 267 98 1278 597 l967 477 950 -468 c1033 -510 1164 -572 1284 -602 236 -60
                        // 517 76 638 308 57 111 72 168 72 269 -1 104 -22 181 -109 386 -107 252 -2259
                        // 5028 -2321 5150 -100 198 -206 297 -362 340 -85 24 -224 24 -307 0z"/>
                        // </g>
                        // </svg>`,
                        width: 32,
                        height: 32,
                      },

                      paint: {
                        "circle-radius": 12,
                        "circle-color": "red",
                        // "circle-stroke-color": "red",
                        "circle-stroke-width": 0,
                      },
                    },
                  },
                  geometry: {
                    type: "Point",
                    coordinates: [-128.0094, 50.6539],
                  },
                },
              ],
            });

            // Set map view
            thisInstance.mapLibreStore.mapLibreMap.setCenter([
              -128.0094, 50.6539,
            ]);
            thisInstance.mapLibreStore.mapLibreMap.setZoom(15);
          },
        });
      }

      // =================== FIVE ====================

      if (doFive) {
        // Create Instance
        const instanceFive = createInstance({
          debug: false,
          id: "waymark-five",
          mapOptions: {
            center: [-122.447303, 37.753574],
            zoom: 10,
          },
          onLoad: (thisInstance) => {
            console.log("Waymark Instance Five Loaded");

            thisInstance.onEvent("geojson-item-updated", (event) => {
              console.log("GeoJSON Item Updated:", event.detail.item.toJSON());
            });

            // Create Map

            const map = createMap();

            // Create Line

            const line = createLine({
              id: "dynamic-line-five",
              properties: {
                waymark: {
                  paint: {
                    "line-color": "blue",
                    "line-width": 4,
                  },
                },
              },
            });

            // Add random point every second
            setInterval(() => {
              const lng = -122.447303 + Math.random() * 0.1;
              const lat = 37.753574 + Math.random() * 0.1;
              line.addCoordinate([lng, lat]);

              thisInstance.geoJSONStore.updateItem(line);
            }, 1000);

            // Add Line to Map

            map.addOverlay(line);

            // Add Map to Instance

            thisInstance.geoJSONStore.addItem(map);
          },
        });
      }

      // =================== SIX ====================

      if (doSix) {
        // Create Instance
        const instanceFive = createInstance({
          debug: true,
          id: "waymark-six",
          mapOptions: {
            center: [-122.447303, 37.753574],
            zoom: 10,
          },

          onLoad: (thisInstance) => {
            const line = createLine({
              id: "dynamic-line-six",
              properties: {
                waymark: {
                  paint: {
                    "line-color": "red",
                    "line-width": 4,
                  },
                },
              },
            });
            thisInstance.geoJSONStore.addItem(line);

            // Add random point every second
            setInterval(() => {
              const lng = -122.447303 + Math.random() * 0.1;
              const lat = 37.753574 + Math.random() * 0.1;
              line.addCoordinate([lng, lat]);
              thisInstance.geoJSONStore.updateItem(line);

              // Add marker
              const marker = createMarker({
                geometry: {
                  type: "Point",
                  coordinates: [lng, lat],
                },
                properties: {
                  waymark: {
                    paint: {
                      "circle-radius": 6,
                      "circle-color": "green",
                      "circle-stroke-color": "white",
                      "circle-stroke-width": 2,
                    },
                  },
                },
              });
              thisInstance.geoJSONStore.addItem(marker);

              thisInstance.dispatchEvent("dynamic-line-updated", {
                line,
              });
            }, 1000);
          },
        });
      }
    </script>
  </body>
