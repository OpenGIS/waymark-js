<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="./assets/waymark-icon-min.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />

    <title>Waymark JS</title>

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <img
      src="/assets/waymark-logo-min.svg"
      alt="Waymark Logo"
      style="
        position: absolute;
        top: 10px;
        left: 10px;
        width: 120px;
        z-index: 1000;
      "
    />

    <!-- Container -->
    <div id="waymark-instance" style="height: 100%"></div>

    <!-- Load Waymark JS -->
    <script type="module">
      import { Instance } from "./library/entry.js";

      // Demo data
      const geoJSON = await fetch(
        "./assets/data/waymark/devDataShape.json",
      ).then((res) => res.json());

      // Create Instance
      const instance = new Instance("waymark-instance", geoJSON);

      console.log("Waymark instance loaded:", instance);
    </script>
  </body>
</html>
