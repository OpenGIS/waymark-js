<html lang="en">
  <head>

    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />

    <title>Waymark JS</title>

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .waymark-instance {
        height: 300px;
        width: 300px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Load Waymark JS -->
    <script type="module">
      import {
        createInstance,
        createLine,
        createMarker,
      } from "./library/entry.js";

      const doOne = true;
      const doTwo = true;
      const doThree = true;
      const doFour = true;
      const doFive = true;
      const doSix = true;

      // ==================== ONE ====================

      if (doOne) {
        // Demo data
        const urls = [
          "./assets/data/waymark/feature.json",
          "./assets/data/waymark/featureCollection.json",
        ];

        // Create Instance
        const instanceOne = createInstance({
          debug: false,
          id: "waymark-one",
          onLoad: (WaymarkInstance) => {
            // Each URL
            urls.forEach(async (url) => {
              fetch(url).then(async (res) => {
                const geoJSON = await res.json();
                WaymarkInstance.addGeoJSON(geoJSON);
              });
            });
          },
        });
      }

      // =================== TWO ===================

      if (doTwo) {
        // Create Instance
        createInstance({
          debug: false,
          id: "waymark-two",
          mapOptions: {
            attributionControl: true,
          },
          onLoad: (WaymarkInstance) => {
            const map = WaymarkInstance.getMapByID("example-geojson");
            map.overlays.forEach((overlay) => {
              setInterval(() => {
                overlay.toggleHighlight();
              }, 500);
            });
          },
          geoJSON: {
            id: "example-geojson",
            type: "FeatureCollection",
            features: [
              {
                type: "Feature",
                properties: {
                  name: "Point Example",
                },
                geometry: {
                  type: "Point",
                  coordinates: [-77.034084, 38.909671],
                },
              },
              {
                type: "Feature",
                properties: {
                  name: "LineString Example",
                },
                geometry: {
                  type: "LineString",
                  coordinates: [
                    [-77.044211, 38.852924],
                    [-77.045659, 38.860158],
                    [-77.044232, 38.862326],
                    [-77.040879, 38.865948],
                    [-77.039936, 38.867698],
                    [-77.032969, 38.870285],
                    [-77.029609, 38.871907],
                    [-77.020339, 38.874276],
                    [-77.018789, 38.875115],
                    [-77.016841, 38.876516],
                    [-77.009051, 38.878241],
                  ],
                },
              },
            ],
          },
        });
      }

      // =================== THREE ====================

      if (doThree) {
        // Check local storage for
        const localMaps =
          JSON.parse(localStorage.getItem("waymarkLocalMaps")) || [];

        const instanceThree = createInstance({
          id: "waymark-three",
          debug: false,
          onLoad: (WaymarkInstance) => {
            localMaps.forEach((geoJSON) => {
              WaymarkInstance.addGeoJSON(geoJSON);
            });
          },
        });

        // Create file upload button
        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = ".json,.geojson";
        fileInput.addEventListener("change", (event) => {
          const file = event.target.files[0];
          const reader = new FileReader();
          reader.onload = (e) => {
            const geoJSON = JSON.parse(e.target.result);

            instanceThree.addGeoJSON(geoJSON);

            // Add to local storage
            localMaps.push(geoJSON);
            localStorage.setItem("waymarkLocalMaps", JSON.stringify(localMaps));
          };
          reader.readAsText(file);
        });
        document.body.appendChild(fileInput);
      }

      // =================== FOUR ====================

      if (doFour) {
        // Create a Waymark Instance with this configuration
        const instanceFour = createInstance({
          debug: false,

          id: "waymark-instance",
          // Passed directly to MapLibre GL JS
          // See [MapLibre Map Options](https://maplibre.org/maplibre-gl-js/docs/API/type-aliases/MapOptions/)
          mapOptions: {
            zoom: 12,
          },

          // Can pass GeoJSON here
          // geoJSON: { type: "FeatureCollection", features: [] }

          // Callback function
          onLoad: (WaymarkInstance) => {
            // console.log("Waymark Instance loaded:", WaymarkInstance.id);
          },
        });

        // Load this GeoJSON, which contains a single "pub" Marker
        const map = instanceFour.addGeoJSON({
          type: "FeatureCollection",
          features: [
            {
              type: "Feature",
              properties: {
                waymark: {
                  paint: {
                    "circle-radius": 6,
                    "circle-color": "blue",
                    "circle-stroke-color": "red",
                    "circle-stroke-width": 6,
                  },
                },
                type: "pub",
                title: "The Scarlet Ibis",
                description:
                  "Great pub, great food! Especially after a Long Ride 🚴🍔🍟🍺🍺💤",
              },
              geometry: {
                type: "Point",
                coordinates: [-128.0094, 50.6539],
              },
            },
          ],
        });
      }

      // setTimeout(() => {
      //   map.remove();
      // }, 10000);

      // =================== FIVE ====================

      if (doFive) {
        // Create Instance
        const instanceFive = createInstance({
          debug: false,
          id: "waymark-five",
          mapOptions: {
            center: [-122.447303, 37.753574],
            zoom: 10,
          },
          geoJSON: {
            id: "instance-five-map",
            type: "FeatureCollection",
            features: [
              {
                id: "instance-five-line",
                type: "Feature",
                properties: {
                  waymark: {
                    paint: {
                      "line-color": "blue",
                      "line-width": 4,
                    },
                  },
                },
                geometry: {
                  type: "LineString",
                  coordinates: [],
                },
              },
            ],
          },
          onLoad: (thisInstance) => {
            const map = thisInstance.getMapByID("instance-five-map");
            const line = map.getOverlayByID("instance-five-line");

            // Add random point every second
            setInterval(() => {
              const lng = -122.447303 + Math.random() * 0.1;
              const lat = 37.753574 + Math.random() * 0.1;
              line.addCoordinate([lng, lat]);

              thisInstance.dispatchEvent("dynamic-line-updated", {
                line,
              });
            }, 1000);
          },
        });
      }

      // =================== SIX ====================

      if (doSix) {
        // Create Instance
        const instanceFive = createInstance({
          debug: false,
          id: "waymark-six",
          mapOptions: {
            center: [-122.447303, 37.753574],
            zoom: 10,
          },

          onLoad: (thisInstance) => {
            const line = createLine({
              id: "dynamic-line-six",
              properties: {
                waymark: {
                  paint: {
                    "line-color": "red",
                    "line-width": 4,
                  },
                },
              },
            });
            thisInstance.addOverlay(line);

            // Add random point every second
            setInterval(() => {
              const lng = -122.447303 + Math.random() * 0.1;
              const lat = 37.753574 + Math.random() * 0.1;
              line.addCoordinate([lng, lat]);

              // Add marker
              const marker = createMarker({
                geometry: {
                  type: "Point",
                  coordinates: [lng, lat],
                },
                properties: {
                  waymark: {
                    paint: {
                      "circle-radius": 6,
                      "circle-color": "green",
                      "circle-stroke-color": "white",
                      "circle-stroke-width": 2,
                    },
                  },
                },
              });
              thisInstance.addOverlay(marker);

              thisInstance.dispatchEvent("dynamic-line-updated", {
                line,
              });
            }, 1000);
          },
        });
      }
    </script>
  </body>
</html>
